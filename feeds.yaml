# AI / Agentic-AI news sources (RSS/Atom only — no scraping).
# category: lab | research | news | market | community
# A dead/unreachable feed is skipped gracefully and shown on /health.

sources:
  # ---- Labs / companies ----
  - name: OpenAI Blog
    url: https://openai.com/blog/rss.xml
    category: lab
    company: OpenAI
  # Anthropic has no official RSS; use Google News (free, no key) for coverage.
  - name: Anthropic News
    url: https://news.google.com/rss/search?q=Anthropic+Claude+AI&hl=en-US&gl=US&ceid=US:en
    category: lab
    company: Anthropic
  - name: Google DeepMind Blog
    url: https://deepmind.google/blog/rss.xml
    category: lab
    company: Google DeepMind
  - name: Google Research Blog
    url: https://research.google/blog/rss/
    category: lab
    company: Google
  # Meta AI blog has no reliable RSS; use Google News (free, no key) for coverage.
  - name: Meta AI News
    url: https://news.google.com/rss/search?q=%22Meta+AI%22+OR+Llama&hl=en-US&gl=US&ceid=US:en
    category: lab
    company: Meta
  - name: Microsoft Research Blog
    url: https://www.microsoft.com/en-us/research/feed/
    category: lab
    company: Microsoft
  - name: AWS Machine Learning Blog
    url: https://aws.amazon.com/blogs/machine-learning/feed/
    category: lab
    company: AWS
  - name: NVIDIA Blog
    url: https://blogs.nvidia.com/feed/
    category: lab
    company: Nvidia
  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    category: lab
    company: Hugging Face

  # ---- Models / topics via Google News (free, no key) ----
  - name: Google Gemini
    url: https://news.google.com/rss/search?q=%22Google+Gemini%22+OR+%22Gemini+model%22+OR+%22Gemini+2%22&hl=en-US&gl=US&ceid=US:en
    category: lab
    company: Google
  - name: NVIDIA AI News
    url: https://news.google.com/rss/search?q=NVIDIA+AI+OR+%22NVIDIA+GPU%22+AI&hl=en-US&gl=US&ceid=US:en
    category: news
    company: Nvidia
  - name: Small Language Models (SLMs)
    url: https://news.google.com/rss/search?q=%22small+language+model%22+OR+%22small+language+models%22&hl=en-US&gl=US&ceid=US:en
    category: research
  - name: DeepSeek
    url: https://news.google.com/rss/search?q=DeepSeek+AI&hl=en-US&gl=US&ceid=US:en
    category: lab
    company: DeepSeek
  - name: Kimi / Moonshot AI
    url: https://news.google.com/rss/search?q=%22Kimi+AI%22+OR+%22Moonshot+AI%22&hl=en-US&gl=US&ceid=US:en
    category: lab
    company: Moonshot
  - name: Perplexity
    url: https://news.google.com/rss/search?q=%22Perplexity+AI%22+-crypto+-price+-coin+-solana+-bitcoin+-prediction&hl=en-US&gl=US&ceid=US:en
    category: lab
    company: Perplexity

  # ---- Tech news ----
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    category: news
  - name: The Verge AI
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    category: news
  - name: Ars Technica AI
    url: https://arstechnica.com/ai/feed/
    category: news
  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    category: news
  - name: MIT Technology Review
    url: https://www.technologyreview.com/feed/
    category: news

  # ---- Market News (Google News, free, no key) ----
  # These names must match aiaggregator/market.py SOURCE_HINTS so items land in
  # the right Market News bucket even before enrichment.
  - name: AI Funding & Investment
    url: https://news.google.com/rss/search?q=AI+startup+funding+OR+%22AI+investment%22+OR+%22AI+valuation%22+OR+%22AI+IPO%22&hl=en-US&gl=US&ceid=US:en
    category: market
  - name: AI Regulation & Policy
    url: https://news.google.com/rss/search?q=%22AI+regulation%22+OR+%22AI+act%22+OR+%22AI+policy%22+OR+%22AI+antitrust%22+OR+%22AI+privacy+law%22&hl=en-US&gl=US&ceid=US:en
    category: market
  - name: AI Mergers & Acquisitions
    url: https://news.google.com/rss/search?q=AI+acquisition+OR+%22AI+merger%22+OR+%22acquires+AI+startup%22&hl=en-US&gl=US&ceid=US:en
    category: market
  - name: AI Partnerships
    url: https://news.google.com/rss/search?q=%22AI+partnership%22+OR+%22partners+with%22+AI+OR+%22AI+alliance%22&hl=en-US&gl=US&ceid=US:en
    category: market
  - name: AI Infrastructure
    url: https://news.google.com/rss/search?q=%22AI+chips%22+OR+%22AI+data+center%22+OR+%22AI+datacenter%22+OR+%22AI+compute%22+OR+%22AI+cloud+infrastructure%22&hl=en-US&gl=US&ceid=US:en
    category: market
  - name: AI Enterprise Adoption
    url: https://news.google.com/rss/search?q=%22enterprise+AI%22+OR+%22AI+adoption%22+OR+%22businesses+adopt+AI%22&hl=en-US&gl=US&ceid=US:en
    category: market
  - name: AI Security & Safety
    url: https://news.google.com/rss/search?q=%22AI+security%22+OR+%22AI+safety%22+OR+%22AI+deepfake%22+OR+%22AI+cyberattack%22&hl=en-US&gl=US&ceid=US:en
    category: market
  - name: AI Startup News
    url: https://news.google.com/rss/search?q=%22AI+startup%22+OR+%22AI+unicorn%22+OR+%22AI+founder%22&hl=en-US&gl=US&ceid=US:en
    category: market

  # ---- Community ----
  - name: Hacker News Front Page
    url: https://hnrss.org/frontpage
    category: community

# Keyword filter applied to broad community feeds (HN, subreddits) so only
# AI-relevant items are kept. Lab/research/news feeds are already on-topic.
community_keywords:
  - ai
  - artificial intelligence
  - llm
  - gpt
  - claude
  - gemini
  - agent
  - agentic
  - model
  - neural
  - machine learning
  - deep learning
  - openai
  - anthropic
  - deepmind
  - hugging face
  - transformer
  - rag
  - fine-tun
  - inference
