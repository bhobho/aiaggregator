# AI / Agentic-AI news sources (RSS/Atom only — no scraping).
# category: lab | research | news | market | blog | podcast | architecture | industry | community
#   market -> "AI News"; blog -> "Blogs"; podcast -> "Podcasts";
#   architecture -> "Architecture"; industry -> "Industry View"; rest -> "Tech News".
# filter: true -> keep only AI-relevant items (community_keywords), for broad feeds.
# Sites without a working RSS feed use a Google News site-query (free, no key).
# A dead/unreachable feed is skipped gracefully and shown on /health.

